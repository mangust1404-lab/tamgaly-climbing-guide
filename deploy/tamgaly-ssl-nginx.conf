server {
    listen 80;
    server_name tamgalyclimb.alexanderlobanov.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tamgalyclimb.alexanderlobanov.de;

    ssl_certificate /etc/letsencrypt/live/tamgalyclimb.alexanderlobanov.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tamgalyclimb.alexanderlobanov.de/privkey.pem;

    root /var/www/tamgaly;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker and HTML must never be cached
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /registerSW.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed assets can be cached forever
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /data/topo-data.json {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
